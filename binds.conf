# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,Return,spawn,kitty

# file browser
bind=SUPER,e,spawn,dolphin

# Browser
bind=SUPER,w,spawn,qutebrowser

# Clipboard
bind=SUPER,c,spawn,kitty --detach --title floatingTui clipse

# Color picker
bind=SUPER+SHIFT,c,spawn,~/.config/mango/color-picker.sh

# Audio
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 10%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 10%-

# Screenshot
bind=NONE,Print,spawn,screenshotmango

# exit
bind=SUPER,m,quit
bind=SUPER,q,killclient,


# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,L,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,f,togglefloating,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=ALT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# Horizontal layouts 
bind=SUPER,t,setlayout,tile
# bind=SUPER+SHIFT,R,setlayout,right_tile
# bind=SUPER+SHIFT,E,setlayout,center_tile
# bind=SUPER,v,setlayout,grid
# bind=SUPER,x,setlayout,tgmix
bind=SUPER,s,setlayout,scroller
# bind=SUPER,c,setlayout,deck

# Vertical layouts
bind=SUPER+SHIFT,T,setlayout,vertical_tile
# bind=SUPER+SHIFT,V,setlayout,vertical_grid
bind=SUPER+SHIFT,S,setlayout,vertical_scroller
# bind=SUPER+SHIFT,C,setlayout,vertical_deck


bind=SUPER,n,switch_layout
bind=SUPER,a,togglegaps

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

# Switch between tags

# bind=SUPER,1,view,1,0
# bind=SUPER,2,view,2,0
# bind=SUPER,3,view,3,0
# bind=SUPER,4,view,4,0
# bind=SUPER,5,view,5,0
# bind=SUPER,7,view,6,0
# bind=SUPER,8,view,7,0
# bind=SUPER,9,view,8,0
# bind=SUPER,0,view,9,0

bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,7,comboview,6
bind=SUPER,8,comboview,7
bind=SUPER,9,comboview,8
bind=SUPER,0,comboview,9

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,7,tag,6,0
bind=SUPER+SHIFT,8,tag,7,0
bind=SUPER+SHIFT,9,tag,8,0
bind=SUPER+SHIFT,0,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Gestures
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,up,4,toggleoverview

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,-1
mousebind=NONE,btn_right,killclient,0
